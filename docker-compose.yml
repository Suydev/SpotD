version: "3.9"

services:
  spotd:
    build: .
    container_name: spotd
    ports:
      - "5000:5000"
    volumes:
      - spotd_data:/app/data         # persists config + sessions
      - spotd_downloads:/app/downloads  # persists ZIPs until served
    environment:
      - PORT=5000
      - SESSION_SECRET=change-me-to-a-random-string
      - FLASK_DEBUG=false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  spotd_data:
  spotd_downloads:
